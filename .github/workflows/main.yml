name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip autoconf libtool libtool-bin m4 pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libncurses-dev cmake libffi-dev libssl-dev

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android build-tools
      run: |
        sdkmanager --licenses < <(yes)
        sdkmanager "build-tools;33.0.0" "platform-tools" "platforms;android-33"
        sdkmanager --list | grep build-tools  # Verify installation

    - name: Install Python packages
      run: |
        pip install --user --upgrade buildozer cython virtualenv

    - name: Build with Buildozer
      run: |
        buildozer -v android debug
      env:
        ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
